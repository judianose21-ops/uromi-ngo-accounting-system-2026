<h2>Edit Budget Item</h2>

<form method="post" action="/update-budget">

<input type="hidden" name="id" value="{{budget.id}}">

<label>Account Code</label>
<input type="text" name="account_code" value="{{budget.account_code}}">

<label>Account Name</label>
<input type="text" name="account_name" value="{{budget.account_name}}">

<label>Sub Account Code</label>
<input type="text" name="subaccount_code" value="{{budget.subaccount_code}}">

<label>Sub Account Name</label>
<input type="text" name="subaccount_name" value="{{budget.subaccount_name}}">

<label>Detail</label>
<input type="text" name="detail" value="{{budget.detail}}">

<label>Quantity</label>
<input type="number" name="quantity" value="{{budget.quantity}}">

<label>Unit Cost</label>
<input type="number" name="unit_cost" value="{{budget.unit_cost}}">

<label>Periods</label>
<input type="number" name="periods" value="{{budget.periods}}">

<label>Total</label>
<input type="number" name="total" value="{{budget.total}}">

<br><br>

<button type="submit">Update Budget</button>

</form>
