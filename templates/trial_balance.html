<!DOCTYPE html>

<html>

<head>
<title>Trial Balance</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* Top header */

.header{
background:#1e293b;
color:white;
padding:15px 30px;
font-size:20px;
}

/* Container */

.container{
padding:30px;
}

/* Card */

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* Report Header */

.report-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
border-bottom:2px solid #ddd;
padding-bottom:10px;
}

.logo{
width:70px;
}

.logo img{
width:70px;
}

.org-title{
text-align:center;
flex:1;
}

.org-title h2{
margin:0;
}

.report-info{
text-align:right;
font-size:13px;
}

/* Print Button */

.print-bar{
margin-bottom:15px;
}

button{
padding:8px 14px;
background:#1e293b;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#334155;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#1e293b;
color:white;
}

tr:hover{
background:#f1f5f9;
}

/* PRINT STYLE */

@media print{

.header{
display:none;
}

button{
display:none;
}

body{
background:white;
}

.container{
padding:0;
}

.card{
box-shadow:none;
border:none;
}

}

</style>

</head>

<body>

<div class="header">
NGO Accounting System
</div>

<div class="container">

<div class="card">

<div class="print-bar">
<button onclick="printReport()">Print Report</button>
</div>

<div class="report-header">

<div class="logo">
<img src="/static/logo.png">
</div>

<div class="org-title">
<h2>UROMI NGO</h2>
<div>Trial Balance Report</div>
</div>

<div class="report-info">
Printed: <span id="printDate"></span>
</div>

</div>

<table>

<thead>
<tr>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
</tr>
</thead>

<tbody>

{% for r in rows %}

<tr>
<td>{{r.account}}</td>
<td>{{r.debit}}</td>
<td>{{r.credit}}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

<script>

function printReport(){
window.print();
}

const today = new Date();
document.getElementById("printDate").innerText = today.toLocaleDateString();

</script>

</body>
</html>
