<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NGO Accounting System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Chart.js (if you need charts on dashboard/reports) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Your custom styles (load after Bootstrap so you can override) -->
    <link rel="stylesheet" href="/static/style.css">
    
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-bg: #0d1a2b;
            --sidebar-hover: #1e3a5f;
            --active-bg: #2c5282;
        }
        
        body {
            min-height: 100vh;
            background-color: #f5f7fa;
        }
        
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            transition: transform 0.3s ease-in-out;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1030;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-link {
            color: rgba(255,255,255,0.85);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin: 0.25rem 0.75rem;
            transition: all 0.2s;
        }
        
        .nav-link:hover,
        .nav-link:focus {
            background-color: var(--sidebar-hover);
            color: white;
        }
        
        .nav-link.active {
            background-color: var(--active-bg);
            color: white;
            font-weight: 500;
        }
        
        .main-content {
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease-in-out;
            padding: 1.5rem;
        }
        
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4 class="mb-0">
                <i class="bi bi-heart-fill me-2 text-danger"></i>
                NGO Finance
            </h4>
        </div>
        
        <nav class="nav flex-column mt-3">
            <a class="nav-link {% if request.path == '/' or request.path == '' %}active{% endif %}" href="/">
                <i class="bi bi-house-door me-2"></i> Dashboard
            </a>
            <a class="nav-link {% if 'donations' in request.path %}active{% endif %}" href="/donations">
                <i class="bi bi-currency-dollar me-2"></i> Donations
            </a>
            <a class="nav-link {% if 'expenses' in request.path %}active{% endif %}" href="/expenses">
                <i class="bi bi-cart-dash me-2"></i> Expenses
            </a>
            <a class="nav-link {% if 'ledger' in request.path %}active{% endif %}" href="/ledger-page">
                <i class="bi bi-journal-text me-2"></i> Ledger
            </a>
            <!-- Add Chart of Accounts here -->
            <a class="nav-link {% if 'chart-of-accounts' in request.path %}active{% endif %}" href="/chart-of-accounts">
                <i class="bi bi-list-check me-2"></i> Chart of Accounts
            </a>
            <a class="nav-link {% if 'projects' in request.path %}active{% endif %}" href="/projects">
                <i class="bi bi-briefcase me-2"></i> Projects
            </a>
            <a class="nav-link {% if 'budgets' in request.path %}active{% endif %}" href="/budgets">
                <i class="bi bi-calculator me-2"></i> Budgets
            </a>
            <a class="nav-link {% if 'reports' in request.path %}active{% endif %}" href="/reports">
                <i class="bi bi-graph-up me-2"></i> Reports
            </a>
        </nav>
    </div>

    <!-- Mobile Toggle Button (only visible < lg) -->
    <button class="btn btn-primary d-lg-none position-fixed m-3" 
            type="button" 
            data-bs-toggle="offcanvas" 
            data-bs-target="#sidebar" 
            aria-controls="sidebar"
            style="z-index: 1040; top: 0; left: 0;">
        <i class="bi bi-list fs-4"></i>
    </button>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}
            <!-- Your page content goes here in child templates -->
        {% endblock %}
    </div>

    <!-- Bootstrap 5 JS bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Optional: your custom JS -->
    <script src="/static/script.js"></script>

</body>
</html>
