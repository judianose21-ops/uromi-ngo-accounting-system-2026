<!DOCTYPE html>

<html>

<head>
<title>UROMI NGO - Balance Sheet</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#1e293b;
color:white;
padding:15px 30px;
font-size:20px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
max-width:900px;
margin:auto;
}

/* REPORT HEADER */

.report-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
border-bottom:2px solid #ddd;
padding-bottom:10px;
}

.logo img{
height:60px;
}

.report-title{
text-align:center;
flex-grow:1;
}

.report-title h2{
margin:0;
}

.report-info{
font-size:13px;
text-align:right;
}

/* PRINT BUTTON */

.print-bar{
text-align:right;
margin-bottom:15px;
}

button{
padding:8px 14px;
background:#1e293b;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#334155;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-bottom:30px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#1e293b;
color:white;
text-align:left;
}

/* PRINT STYLE */

@media print{

.header{
display:none;
}

button{
display:none;
}

body{
background:white;
}

.container{
padding:0;
}

.card{
box-shadow:none;
border:none;
}

}

</style>

</head>

<body>

<div class="header">
UROMI NGO Accounting – Balance Sheet
</div>

<div class="container">

<div class="card">

<div class="print-bar">
<button onclick="printReport()">Print Report</button>
</div>

<div class="report-header">

<div class="logo">
<img src="/static/logo.png" alt="Organization Logo">
</div>

<div class="report-title">
<h2>BALANCE SHEET</h2>
<div>UROMI NGO Financial Statement</div>
</div>

<div class="report-info">
Printed: <span id="printDate"></span>
</div>

</div>

<h3>Assets</h3>

<table>

<tr>
<th>Account</th>
<th>Total</th>
</tr>

{% for a in assets %}

<tr>
<td>{{a.account}}</td>
<td>₦ {{a.total}}</td>
</tr>

{% endfor %}

</table>

<h3>Liabilities</h3>

<table>

<tr>
<th>Account</th>
<th>Total</th>
</tr>

{% for l in liabilities %}

<tr>
<td>{{l.account}}</td>
<td>₦ {{l.total}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

<script>

function printReport(){
window.print();
}

const today = new Date();
document.getElementById("printDate").innerText = today.toLocaleDateString();

</script>

</body>

</html>
