name: Build EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements.txt pyinstaller==6.19.0

    - name: Build EXE
      run: |
        pyinstaller --clean --log-level=DEBUG UROMI.spec

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ngo-accounting-exe
        path: dist/UROMI.exe

    - name: Create GitHub Release and upload EXE
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peter-evans/create-release@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: Automated build release for UROMI executable.
        draft: false
        prerelease: false
        files: dist/UROMI.exe