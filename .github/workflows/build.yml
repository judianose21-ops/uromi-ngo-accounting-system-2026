name: Build EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt pyinstaller==6.19.0

    - name: Build EXE
      run: |
        pyinstaller --clean --log-level=DEBUG UROMI.spec

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: ngo-accounting-exe
        path: dist/UROMI.exe