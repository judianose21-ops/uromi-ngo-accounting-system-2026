<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_edit %}Edit Transaction{% else %}Add Transaction{% endif %} - UROMI NGO Accounting</title>

    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; margin: 0; }
        .container { max-width: 750px; margin: 0 auto; }
        .card { background: #fff; border-radius: 14px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4e73df, #224abe); color: #fff; padding: 20px; text-align: center; }
        .card-body { padding: 25px; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; min-width: 200px; }
        label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px; }
        .btn-primary { background: linear-gradient(135deg, #4e73df, #224abe); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .divider { height: 1px; background: #eee; margin: 20px 0; }
    </style>
</head>

<body>
<div class="container">
    <div class="card">

        <div class="header">
            <h2>
                {% if is_edit %}
                    ✏️ Edit Transaction #{{ edit_id }}
                {% else %}
                    ➕ Add New Transaction
                {% endif %}
            </h2>
        </div>

        <div class="card-body">

            <form method="POST"
                  action="{% if is_edit %}/update-transaction{% else %}/add-transaction{% endif %}">

                {% if is_edit %}
                <input type="hidden" name="id" value="{{ edit_id }}">
                {% endif %}

                <!-- DATE -->
                <div class="row">
                    <div class="col">
                        <label>Date</label>
                        <input type="date" name="date"
                        value="{{ form_data.date if form_data else (transaction.date if transaction else '') }}" required>
                    </div>
                </div>

                <!-- DESCRIPTION -->
                <div class="row">
                    <div class="col">
                        <label>Description</label>
                        <input type="text" name="description"
                        value="{{ form_data.description if form_data else (transaction.description if transaction else '') }}" required>
                    </div>
                </div>

                <!-- TYPE -->
                <div class="row">
                    <div class="col">
                        <label>Type</label>
                        <select name="type" required>
                            <option value="">Select</option>
                            <option value="Income"
                            {% if (form_data and form_data.type=='Income') or (transaction and transaction.type=='Income') %}selected{% endif %}>
                                Income
                            </option>
                            <option value="Expense"
                            {% if (form_data and form_data.type=='Expense') or (transaction and transaction.type=='Expense') %}selected{% endif %}>
                                Expense
                            </option>
                        </select>
                    </div>
                </div>

                <!-- AMOUNT -->
                <div class="row">
                    <div class="col">
                        <label>Amount</label>
                        <input type="number" step="0.01" name="amount"
                        value="{{ form_data.gross_amount if form_data else (transaction.amount if transaction else '') }}" required>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- ACCOUNTS -->
                <div class="row">

                    <div class="col">
                        <label>Main Account</label>
                        <select name="account_code" required>
                            <option value="">Select</option>
                            {% for acc in main_accounts %}
                            <option value="{{ acc.account_code }}"
                            {% if (form_data and form_data.main_account_code==acc.account_code)
                            or (transaction and transaction.main_account_code==acc.account_code) %}selected{% endif %}>
                                {{ acc.account_code }} - {{ acc.account_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col">
                        <label>Sub Account</label>
                        <select name="sub_account_code">
                            <option value="">None</option>
                            {% for sub in subaccounts %}
                            <option value="{{ sub.sub_account_code }}"
                            {% if (form_data and form_data.sub_account_code==sub.sub_account_code)
                            or (transaction and transaction.sub_account_code==sub.sub_account_code) %}selected{% endif %}>
                                {{ sub.sub_account_code }} - {{ sub.sub_account_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                </div>

                <div class="divider"></div>

                <!-- WHT -->
                <div class="row">
                    <div class="col">
                        <label>
                            <input type="checkbox" id="wht_applied" name="wht_applied"
                            {% if form_data and form_data.wht_applied=='on' %}checked{% endif %}>
                            Apply WHT
                        </label>
                    </div>
                </div>

                <div id="wht_fields" style="display:none;">
                    <div class="row">
                        <div class="col">
                            <label>WHT Rate (%)</label>
                            <input type="number" id="wht_rate" name="wht_rate"
                            value="{{ form_data.wht_rate if form_data else '0' }}">
                        </div>
                        <div class="col">
                            <label>WHT Amount</label>
                            <input type="text" id="wht_amount_display" readonly>
                        </div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="actions">
                    <button type="submit" class="btn btn-primary">
                        {% if is_edit %}Update{% else %}Save{% endif %}
                    </button>
                    <a href="/transactions-page" class="btn btn-danger">Cancel</a>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const whtCheckbox = document.getElementById("wht_applied");
    const whtFields = document.getElementById("wht_fields");
    const amountInput = document.querySelector("[name='amount']");
    const rateInput = document.getElementById("wht_rate");
    const display = document.getElementById("wht_amount_display");

    function toggle(){
        whtFields.style.display = whtCheckbox.checked ? "block" : "none";
        calculate();
    }

    function calculate(){
        if(!whtCheckbox.checked){
            display.value = "₦0.00";
            return;
        }
        let amt = parseFloat(amountInput.value)||0;
        let rate = parseFloat(rateInput.value)||0;
        let wht = amt * rate/100;
        display.value = "₦"+wht.toLocaleString();
    }

    whtCheckbox.addEventListener("change", toggle);
    amountInput.addEventListener("input", calculate);
    rateInput.addEventListener("input", calculate);

    toggle();
});
</script>

</body>
</html>
