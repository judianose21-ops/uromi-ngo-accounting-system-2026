name: ngo_accounting_app
description: A Flutter NGO accounting system with transactions, budgets, reports, and user authentication.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.0.6
  intl: ^0.18.1
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  http: ^1.1.0
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
